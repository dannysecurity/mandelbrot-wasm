<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mandelbrot Explorer</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f1117;
        --panel: #1a1d27;
        --text: #e6e8ef;
        --accent: #6ea8fe;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        padding: 1rem;
      }
      h1 { font-size: 1.25rem; font-weight: 600; margin: 0; }
      .stage {
        width: min(960px, 100%);
      }
      #canvas {
        display: block;
        width: 100%;
        height: auto;
        aspect-ratio: 4 / 3;
        border: 1px solid #2a3142;
        border-radius: 8px;
        cursor: grab;
        touch-action: none;
        image-rendering: pixelated;
      }
      #canvas:active { cursor: grabbing; }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        align-items: center;
        background: var(--panel);
        padding: 0.75rem 1rem;
        border-radius: 8px;
      }
      label { display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; }
      button, select {
        background: #252a38;
        color: var(--text);
        border: 1px solid #3a4258;
        border-radius: 6px;
        padding: 0.4rem 0.75rem;
        font: inherit;
      }
      button:hover, select:hover { border-color: var(--accent); }
      #status { font-size: 0.85rem; opacity: 0.85; font-variant-numeric: tabular-nums; }
    </style>
  </head>
  <body>
    <h1>Mandelbrot Explorer</h1>
    <div class="stage">
      <canvas id="canvas" width="800" height="600"></canvas>
    </div>
    <div class="toolbar">
      <label>
        Palette
        <select id="palette"></select>
      </label>
      <label>
        Max iterations
        <input id="iterations" type="range" min="64" max="1024" step="64" value="256" />
      </label>
      <button id="reset">Reset view</button>
    </div>
    <p id="status">Loading WebAssembly…</p>
    <script type="module" src="./www/app.js"></script>
  </body>
</html>
